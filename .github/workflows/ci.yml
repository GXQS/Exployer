name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

# Least-privilege token: only read repository contents
permissions:
  contents: read

jobs:
  ci:
    name: Lint, Type-check & Build
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x, 22.x]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies (reproducible)
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build (includes type-check)
        # `next build` runs TypeScript type-checking internally and generates
        # next-env.d.ts, so a separate `tsc --noEmit` step is not needed.
        run: npm run build
        env:
          NODE_ENV: production
